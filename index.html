<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>CXone Chat</title>
</head>

<body>

<script>

function logToRN(msg){
 window.ReactNativeWebView?.postMessage(msg);
 console.log(msg);
}

function initCXone(){
 logToRN('Loading CXone SDK...');

 (function(n,u){

 window.CXoneDfo = n;

 window[n] = window[n] || function () {
 (window[n].q = window[n].q || []).push(arguments);
 };

 window[n].u = u;

 const e = document.createElement("script");
 e.type = "module";
 e.src = u + "?" + Math.round(Date.now()/1e3/3600);

 e.onload = () => {

 logToRN("CXone SDK loaded");

 openChat(); 

 };

 e.onerror = () => logToRN("CXone SDK failed to load");

 document.head.appendChild(e);

 })("cxone","https://web-modules-de-na1.niceincontact.com/loader/1/loader.js");

}

function openChat(){

 logToRN("Opening chat");

 if(!window.cxone){
 logToRN("CXone not initialized yet");
 return;
 }
 logToRN("injectionstarted");
const config = window.chatConfig || {};

 const entryPoint = config.entryPoint;
 const memberId = config.memberId;
 const policyId = config.policyId;
 const hasCareNavigator = config.hasCareNavigator
if(!entryPoint || !memberId || !policyId || !hasCareNavigator){
 logToRN("CHAT_CONFIG_MISSING")
 return;
}
 
 cxone('init','5781');

 cxone('guide','init');
 
 cxone('guide','openEntrypoint',entryPoint);
  
 cxone('chat','setCaseCustomField','memberid',memberId);
 cxone('chat','setCaseCustomField','policyid',policyId);
 cxone('chat', 'setContactCustomField', 'navigatorflag', hasCareNavigator);



 cxone('chat','enableCloseIcon', true);

 cxone('chat','openChatWindow');

 logToRN("Chat opened");

}

window.onload = initCXone;

</script>

</body>
</html>
